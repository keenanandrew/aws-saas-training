<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS SaaS Architecture Course</title>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --bg-hover: #30363d;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --green: #3fb950;
    --green-dim: #238636;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #db6d28;
    --purple: #bc8cff;
    --sidebar-width: 320px;
    --header-height: 56px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    overflow: hidden;
    height: 100vh;
  }

  header {
    height: var(--header-height);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-left h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .header-left .subtitle {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .progress-summary {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .progress-bar-container {
    width: 160px;
    height: 6px;
    background: var(--bg-tertiary);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .layout {
    display: flex;
    margin-top: var(--header-height);
    height: calc(100vh - var(--header-height));
  }

  .sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }

  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 3px; }

  .sidebar-section-label {
    padding: 8px 20px 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }

  .week-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 20px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s ease;
  }

  .week-item:hover { background: var(--bg-tertiary); }

  .week-item.active {
    background: var(--bg-tertiary);
    border-left-color: var(--accent);
  }

  .week-number {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    margin-top: 2px;
  }

  .week-number.not-started {
    background: var(--bg-tertiary);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .week-number.in-progress {
    background: var(--accent-dim);
    color: #fff;
  }

  .week-number.completed {
    background: var(--green-dim);
    color: #fff;
  }

  .week-info { flex: 1; min-width: 0; }

  .week-info .title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
  }

  .week-info .tagline {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  .week-info .task-count {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .main-content {
    flex: 1;
    overflow-y: auto;
    padding: 40px 60px;
    max-width: 900px;
  }

  .main-content::-webkit-scrollbar { width: 8px; }
  .main-content::-webkit-scrollbar-track { background: transparent; }
  .main-content::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }

  .week-header {
    margin-bottom: 32px;
  }

  .week-header .week-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .week-header h2 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .week-header .objective {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .section {
    margin-bottom: 40px;
  }

  .section-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.01em;
  }

  .section-title.problem { color: var(--orange); }
  .section-title.concepts { color: var(--purple); }
  .section-title.tasks { color: var(--green); }
  .section-title.challenge { color: var(--yellow); }

  .problem-content {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-primary);
  }

  .problem-content p { margin-bottom: 12px; }
  .problem-content p:last-child { margin-bottom: 0; }

  .concept-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .concept-header {
    padding: 16px 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.15s ease;
  }

  .concept-header:hover { background: var(--bg-tertiary); }

  .concept-header .arrow {
    font-size: 12px;
    color: var(--text-muted);
    transition: transform 0.2s ease;
  }

  .concept-header .arrow.open { transform: rotate(90deg); }

  .concept-body {
    padding: 0 20px 20px;
    font-size: 14px;
    line-height: 1.7;
    display: none;
  }

  .concept-body.open { display: block; }

  .concept-body p { margin-bottom: 12px; }
  .concept-body p:last-child { margin-bottom: 0; }

  .concept-body code {
    background: var(--bg-tertiary);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 13px;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }

  .concept-body pre {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    overflow-x: auto;
    margin: 12px 0;
    font-size: 13px;
    line-height: 1.5;
  }

  .concept-body pre code {
    background: none;
    padding: 0;
    font-size: 13px;
  }

  .task-item {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 12px;
    transition: border-color 0.15s ease;
  }

  .task-item.completed { border-color: var(--green-dim); }

  .task-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .task-checkbox {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    transition: all 0.15s ease;
    background: transparent;
  }

  .task-checkbox:hover { border-color: var(--accent); }

  .task-checkbox.checked {
    background: var(--green-dim);
    border-color: var(--green-dim);
  }

  .task-checkbox.checked::after {
    content: '✓';
    color: #fff;
    font-size: 13px;
    font-weight: 700;
  }

  .task-content { flex: 1; }

  .task-content .task-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .task-content .task-description {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .task-meta {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .task-meta-item {
    display: flex;
    gap: 8px;
    font-size: 13px;
    line-height: 1.5;
  }

  .task-meta-item .label {
    flex-shrink: 0;
    font-weight: 600;
    min-width: 80px;
  }

  .task-meta-item .label.why { color: var(--yellow); }
  .task-meta-item .label.verify { color: var(--accent); }

  .task-meta-item .value {
    color: var(--text-secondary);
  }

  .challenge-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-left: 3px solid var(--yellow);
    border-radius: 8px;
    padding: 24px;
  }

  .challenge-card h4 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .challenge-card .challenge-desc {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .challenge-card pre {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 16px;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }

  .toggle-btn {
    display: inline-block;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-right: 8px;
    margin-bottom: 8px;
  }

  .toggle-btn:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }

  .hidden { display: none; }

  .hint-list, .solution-block {
    margin-top: 12px;
  }

  .hint-list li {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 4px 0;
    padding-left: 8px;
    list-style: none;
    border-left: 2px solid var(--yellow);
    margin-bottom: 6px;
    margin-left: 4px;
  }

  .solution-block pre {
    margin-top: 8px;
  }

  .no-challenge {
    color: var(--text-muted);
    font-size: 14px;
    font-style: italic;
  }

  .welcome-screen {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    text-align: center;
    padding: 40px;
  }

  .welcome-screen h2 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }

  .welcome-screen p {
    font-size: 16px;
    color: var(--text-secondary);
    max-width: 520px;
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .welcome-stats {
    display: flex;
    gap: 32px;
    margin-top: 32px;
  }

  .stat-box {
    text-align: center;
  }

  .stat-box .stat-value {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-box .stat-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .reset-btn {
    margin-top: 32px;
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text-muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .reset-btn:hover {
    color: var(--red);
    border-color: var(--red);
  }

  strong { font-weight: 600; }

  @media (max-width: 900px) {
    .sidebar { width: 260px; min-width: 260px; }
    .main-content { padding: 24px 32px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>AWS SaaS Architecture</h1>
    <span class="subtitle">From Zero to Production</span>
  </div>
  <div class="progress-summary">
    <span id="progressText">0 / 0 tasks</span>
    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>
    <span id="progressPercent">0%</span>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" id="mainContent"></main>
</div>

<script>
(function() {
  const STORAGE_KEY = 'aws-saas-training-progress';
  let curriculum = null;
  let activeWeekId = null;

  function loadProgress() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch { return {}; }
  }

  function saveProgress(progress) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  }

  function isTaskCompleted(taskId) {
    return loadProgress()[taskId] === true;
  }

  function toggleTask(taskId) {
    const progress = loadProgress();
    progress[taskId] = !progress[taskId];
    saveProgress(progress);
    renderSidebar();
    renderWeek(activeWeekId);
    updateGlobalProgress();
  }

  function getWeekProgress(week) {
    const progress = loadProgress();
    const total = week.tasks.length;
    const done = week.tasks.filter(t => progress[t.id]).length;
    return { done, total };
  }

  function getGlobalProgress() {
    const progress = loadProgress();
    let total = 0, done = 0;
    for (const week of curriculum.weeks) {
      total += week.tasks.length;
      done += week.tasks.filter(t => progress[t.id]).length;
    }
    return { done, total };
  }

  function updateGlobalProgress() {
    const { done, total } = getGlobalProgress();
    document.getElementById('progressText').textContent = `${done} / ${total} tasks`;
    document.getElementById('progressPercent').textContent = total ? Math.round((done/total)*100) + '%' : '0%';
    document.getElementById('progressBar').style.width = total ? ((done/total)*100) + '%' : '0%';
  }

  function renderSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = '<div class="sidebar-section-label">Curriculum</div>';

    for (const week of curriculum.weeks) {
      const { done, total } = getWeekProgress(week);
      const status = done === 0 ? 'not-started' : done === total ? 'completed' : 'in-progress';
      const el = document.createElement('div');
      el.className = 'week-item' + (week.id === activeWeekId ? ' active' : '');
      el.innerHTML = `
        <div class="week-number ${status}">${week.id}</div>
        <div class="week-info">
          <div class="title">${week.title}</div>
          <div class="tagline">${week.tagline}</div>
          <div class="task-count">${done}/${total} tasks</div>
        </div>
      `;
      el.addEventListener('click', () => {
        activeWeekId = week.id;
        renderSidebar();
        renderWeek(week.id);
      });
      sidebar.appendChild(el);
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function formatContent(text) {
    let result = escapeHtml(text);

    result = result.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      return `<pre><code>${code.trim()}</code></pre>`;
    });

    result = result.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    result = result.replace(/`([^`]+)`/g, '<code>$1</code>');
    result = result.split('\n\n').map(p => {
      if (p.startsWith('<pre>') || p.startsWith('<strong>')) return p;
      return `<p>${p}</p>`;
    }).join('');
    result = result.replace(/<p><pre>/g, '<pre>').replace(/<\/pre><\/p>/g, '</pre>');

    return result;
  }

  function renderWeek(weekId) {
    const week = curriculum.weeks.find(w => w.id === weekId);
    if (!week) { renderWelcome(); return; }

    const main = document.getElementById('mainContent');
    let html = '';

    html += `
      <div class="week-header">
        <div class="week-label">Week ${week.id}</div>
        <h2>${escapeHtml(week.title)}</h2>
        <div class="objective">${escapeHtml(week.objective)}</div>
      </div>
    `;

    html += `
      <div class="section">
        <h3 class="section-title problem">${escapeHtml(week.problem.title)}</h3>
        <div class="problem-content">${formatContent(week.problem.content)}</div>
      </div>
    `;

    html += '<div class="section"><h3 class="section-title concepts">Concepts</h3>';
    for (let i = 0; i < week.concepts.length; i++) {
      const c = week.concepts[i];
      const cid = `concept-${week.id}-${i}`;
      html += `
        <div class="concept-card">
          <div class="concept-header" onclick="toggleConcept('${cid}')">
            <span>${escapeHtml(c.title)}</span>
            <span class="arrow" id="arrow-${cid}">▸</span>
          </div>
          <div class="concept-body" id="${cid}">${formatContent(c.content)}</div>
        </div>
      `;
    }
    html += '</div>';

    html += '<div class="section"><h3 class="section-title tasks">Tasks</h3>';
    for (const task of week.tasks) {
      const checked = isTaskCompleted(task.id);
      html += `
        <div class="task-item${checked ? ' completed' : ''}">
          <div class="task-top">
            <div class="task-checkbox${checked ? ' checked' : ''}" onclick="toggleTaskClick('${task.id}')"></div>
            <div class="task-content">
              <div class="task-title">${escapeHtml(task.title)}</div>
              <div class="task-description">${escapeHtml(task.description)}</div>
              <div class="task-meta">
                <div class="task-meta-item">
                  <span class="label why">Why</span>
                  <span class="value">${escapeHtml(task.why)}</span>
                </div>
                <div class="task-meta-item">
                  <span class="label verify">Verify</span>
                  <span class="value">${escapeHtml(task.verification)}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }
    html += '</div>';

    if (week.codeChallenge) {
      const ch = week.codeChallenge;
      const chId = `challenge-${week.id}`;
      html += `
        <div class="section">
          <h3 class="section-title challenge">Code Challenge</h3>
          <div class="challenge-card">
            <h4>${escapeHtml(ch.title)}</h4>
            <div class="challenge-desc">${escapeHtml(ch.description)}</div>
            <pre>${escapeHtml(ch.code)}</pre>
            <button class="toggle-btn" onclick="toggleBlock('hints-${chId}')">Show Hints</button>
            <button class="toggle-btn" onclick="toggleBlock('solution-${chId}')">Show Solution</button>
            <div class="hint-list hidden" id="hints-${chId}">
              <ul>${ch.hints.map(h => `<li>${escapeHtml(h)}</li>`).join('')}</ul>
            </div>
            <div class="solution-block hidden" id="solution-${chId}">
              <pre>${escapeHtml(ch.solution)}</pre>
            </div>
          </div>
        </div>
      `;
    }

    main.innerHTML = html;
    main.scrollTop = 0;
  }

  function renderWelcome() {
    const main = document.getElementById('mainContent');
    const { done, total } = getGlobalProgress();
    main.innerHTML = `
      <div class="welcome-screen">
        <h2>${escapeHtml(curriculum.title)}</h2>
        <p>${escapeHtml(curriculum.subtitle)}</p>
        <p style="font-size:14px; color: var(--text-muted);">Region: ${escapeHtml(curriculum.region)} · Budget: ${escapeHtml(curriculum.costCap)}</p>
        <div class="welcome-stats">
          <div class="stat-box">
            <div class="stat-value">${curriculum.weeks.length}</div>
            <div class="stat-label">Weeks</div>
          </div>
          <div class="stat-box">
            <div class="stat-value">${total}</div>
            <div class="stat-label">Tasks</div>
          </div>
          <div class="stat-box">
            <div class="stat-value">${done}</div>
            <div class="stat-label">Completed</div>
          </div>
        </div>
        <button class="reset-btn" onclick="resetProgress()">Reset All Progress</button>
      </div>
    `;
  }

  window.toggleConcept = function(id) {
    const body = document.getElementById(id);
    const arrow = document.getElementById('arrow-' + id);
    body.classList.toggle('open');
    arrow.classList.toggle('open');
  };

  window.toggleTaskClick = function(taskId) {
    toggleTask(taskId);
  };

  window.toggleBlock = function(id) {
    document.getElementById(id).classList.toggle('hidden');
  };

  window.resetProgress = function() {
    if (confirm('Reset all progress? This cannot be undone.')) {
      localStorage.removeItem(STORAGE_KEY);
      renderSidebar();
      updateGlobalProgress();
      if (activeWeekId) renderWeek(activeWeekId);
      else renderWelcome();
    }
  };

  fetch('curriculum.json')
    .then(r => r.json())
    .then(data => {
      curriculum = data;
      renderSidebar();
      updateGlobalProgress();
      renderWelcome();
    })
    .catch(err => {
      document.getElementById('mainContent').innerHTML = `
        <div class="welcome-screen">
          <h2>Failed to load curriculum</h2>
          <p>Could not load curriculum.json. Make sure you're serving this file via a local HTTP server, not opening it directly as a file.</p>
          <p style="color: var(--text-muted); font-size:14px; margin-top:16px;">
            Run: <code style="background:var(--bg-tertiary);padding:4px 8px;border-radius:4px;">npx serve ./app</code> or <code style="background:var(--bg-tertiary);padding:4px 8px;border-radius:4px;">python -m http.server 8000 --directory app</code>
          </p>
        </div>
      `;
    });
})();
</script>
</body>
</html>
